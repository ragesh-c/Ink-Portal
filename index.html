<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ink & Frame Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Dancing+Script:wght@500;700&family=Special+Elite&family=Press+Start+2P&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              comic: ['"Bangers"', 'cursive'],
              sans: ['"Inter"', 'sans-serif'],
            },
            colors: {
              ink: '#0a0a0a',
              paper: '#fcfbf7',
              accent: '#ff4d4d', // Bold Red
              secondary: '#fbbf24', // Yellow
              'comic-blue': '#3b82f6',
            },
            boxShadow: {
              'comic': '6px 6px 0px 0px #0a0a0a',
              'comic-hover': '10px 10px 0px 0px #0a0a0a',
              'comic-sm': '3px 3px 0px 0px #0a0a0a',
            },
            animation: {
              'comic-pop': 'comicPopReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'marquee': 'marquee 25s linear infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for a cleaner feel */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #f4f4f5;
        border-left: 1px solid #e4e4e7;
      }
      ::-webkit-scrollbar-thumb {
        background: #fbbf24;
        border: 2px solid #f4f4f5;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ff4d4d;
      }
      
      /* Light Comic Background with Paper Texture */
      .bg-comic-light {
        background-color: #fdfbf7;
        background-image: 
          url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E"),
          radial-gradient(#e5e7eb 15%, transparent 16%), 
          radial-gradient(#e5e7eb 15%, transparent 16%);
        background-size: 200px 200px, 24px 24px, 24px 24px;
        background-position: 0 0, 0 0, 12px 12px;
      }

      .halftone-pattern {
        background-image: radial-gradient(#0a0a0a 1.5px, transparent 1.5px);
        background-size: 8px 8px;
        opacity: 0.05; /* Reduced opacity for better readability */
      }

      .paper-texture {
        background-color: #fcfbf7;
        background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      }
      
      /* Comic Text Stroke Utility */
      .text-stroke-white {
        -webkit-text-stroke: 5px white;
        paint-order: stroke fill;
      }
      .text-stroke-ink {
        -webkit-text-stroke: 1.5px #0a0a0a;
        paint-order: stroke fill;
      }

      /* ── Comic Page Flip ── */
      .perspective-1000 {
        perspective: 1600px;
        perspective-origin: 50% 40%;
      }

      .transform-style-3d {
        transform-style: preserve-3d;
        transform-origin: left center;
        position: relative;
        will-change: transform;
      }

      /* Soft shadow that builds as the page lifts */
      .transform-style-3d::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          transparent 50%,
          rgba(0,0,0,0.06) 75%,
          rgba(0,0,0,0.2) 100%
        );
        opacity: 0;
        pointer-events: none;
        z-index: 50;
      }

      /* Idle */
      .page-idle {
        transform: rotateY(0deg);
      }
      .page-idle::after { opacity: 0; transition: opacity 0.3s; }

      /* Out — page lifts and folds away, steady pace */
      .page-flip-out {
        transform: rotateY(-90deg);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.8, 1);
      }
      .page-flip-out::after {
        opacity: 1;
        transition: opacity 0.35s ease-in;
      }

      /* Setup — new page waiting folded from the right */
      .page-flip-in-setup {
        transform: rotateY(90deg);
        transition: none !important;
      }
      .page-flip-in-setup::after { opacity: 0; }

      /* In — new page falls open smoothly, no overshoot */
      .page-flip-in-active {
        transform: rotateY(0deg);
        transition: transform 0.5s cubic-bezier(0.2, 0, 0.3, 1);
      }
      .page-flip-in-active::after {
        opacity: 0;
        transition: opacity 0.4s ease-out;
      }

      /* Comic Pop Scroll Reveal */
      @keyframes comicPopReveal {
        0% { opacity: 0; transform: scale(0.9) translateY(40px) rotate(var(--reveal-rotate-start, -2deg)); }
        60% { opacity: 1; transform: scale(1.02) translateY(-8px) rotate(var(--reveal-rotate-mid, 1deg)); }
        100% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
      }
      .animate-comic-pop {
        animation: comicPopReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        opacity: 0; /* Start hidden */
        will-change: transform, opacity;
      }

      /* ── RDR2 Journal Styles ── */
      .journal-paper {
        background-color: #e8d5a3;
        background-image:
          repeating-linear-gradient(
            transparent,
            transparent 27px,
            rgba(139, 90, 43, 0.13) 27px,
            rgba(139, 90, 43, 0.13) 28px
          );
      }
      .journal-spine {
        background: linear-gradient(to right, #1e0d04, #3d1a08, #4a2010, #3d1a08, #1e0d04);
        border-right: 2px solid #120802;
      }
      .font-journal { font-family: 'Dancing Script', cursive; }
      .font-stamp   { font-family: 'Special Elite', cursive; }
      .journal-stamp-work {
        font-family: 'Special Elite', cursive;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #7a1a1a;
        border: 1.5px solid #7a1a1a;
        padding: 2px 8px;
        opacity: 0.65;
        display: inline-block;
      }
      .journal-stamp-edu {
        font-family: 'Special Elite', cursive;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #1a3d5c;
        border: 1.5px solid #1a3d5c;
        padding: 2px 8px;
        opacity: 0.65;
        display: inline-block;
      }
      .journal-entry-current {
        background: rgba(139, 90, 43, 0.06);
        border-left: 3px solid rgba(139, 58, 15, 0.5);
        padding-left: 10px;
      }
      /* Aged foxing spots */
      .journal-paper::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(ellipse 20px 14px at 82% 18%, rgba(139,90,43,0.07) 0%, transparent 100%),
          radial-gradient(ellipse 35px 22px at 15% 65%, rgba(139,90,43,0.06) 0%, transparent 100%),
          radial-gradient(ellipse 18px 12px at 60% 88%, rgba(139,90,43,0.05) 0%, transparent 100%),
          radial-gradient(ellipse 28px 18px at 90% 50%, rgba(139,90,43,0.04) 0%, transparent 100%);
        pointer-events: none;
      }

      /* Comic Hover Effects */
      .hover-comic-pop {
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      }
      .hover-comic-pop:hover {
        transform: translateY(-4px) rotate(-1deg) scale(1.02);
      }
      
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "vite": "https://esm.sh/vite@^7.3.0",

  }
}
</script>
</head>
  <body class="bg-comic-light antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
